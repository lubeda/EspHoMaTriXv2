# https://devices.esphome.io/devices/M5Stack-M5StickC-PLUS
substitutions:
  devicename: m5stick
  friendly_name: m5strick
  board: m5stick-c
  timing: 16ms

external_components:
  - source:
      type: local
      path: ../components
  #  components: [ ehmtxv2 ]   

esphome:
  comment: "M5 from LuBeDa"
  name: $devicename 
  platformio_options:
    upload_speed: 115200
  project:
    name: "M5 Stick.EHMTXv2"
    version: "2.0.0"

esp32:
  board: "$board"
  framework:
    type: esp-idf
    version: recommended
    
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO37
      inverted: true
    name: ${devicename} Button A
    on_press:
      then:
        - light.turn_on: led1
    on_release:
      then:
        - light.turn_off: led1

  - platform: gpio
    pin:
      number: GPIO39
      inverted: true
    name: ${devicename} Button B
    on_press:
      then:
        - light.turn_on: led1
    on_release:
      then:
        - light.turn_off: led1


font:
  - file: "https://raw.githubusercontent.com/trip5/Matrix-Fonts/refs/heads/main/6-series/MatrixChunky6.ttf"
    id: special_font
    glyphs:  |-
      ! "#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\]_abcdefghijklmnopqrstuvwxyzöäüÖÄÜ°{|}€~

  - file: "https://raw.githubusercontent.com/trip5/Matrix-Fonts/refs/heads/main/8-series/MatrixChunky8.ttf"
    id: default_font
    glyphs:  |-
      ! "#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\]^_`abcdefghijklmnopqrstuvwxyzöäüÖÄÜ°{|}¨¸€~
      
logger:
  level: DEBUG
  logs:
    graph: error

api:
  custom_services: true

ota:
  password: "go.home"
  platform: esphome

wifi:
  ssid: LB6490
  password: "1330972413321581"
  enable_btm: True
  enable_rrm: True
  min_auth_mode: WPA2
  fast_connect: True

light:
  - platform: monochromatic
    output:  builtin_led
    name: ${devicename} Led
    id: led1

color:
  - id: graph_color
    red: 100%
    green: 20%
    blue: 25%

output:
  - platform: ledc
    pin: GPIO10
    inverted: true
    id: builtin_led

spi:
  clk_pin: GPIO13
  mosi_pin: GPIO15

i2c:
   - id: bus_a
     sda: GPIO21
     scl: GPIO22
     scan: True

axp192:
  id: axp
  address: 0x34
  update_interval: 60s


display:
  - platform: st7789v  
    id: ehmtx_display
    model: TTGO_TDISPLAY_135X240
    eightbitcolor: true 
    #power_supply: 3.3V
    #bus_mode: single
    cs_pin: GPIO5
    dc_pin: GPIO23
    reset_pin: GPIO18
    rotation: 270
    #device_height: 80
    #device_width: 160
    #row_start: 0
    #col_start: 0
    #auto_clear_enabled: true
    lambda: |-
      id(rgb8x32)->tick();
      id(rgb8x32)->draw();
    

time:
  - platform: homeassistant
    id: ehmtx_time

ehmtxv2:
  id: rgb8x32
  matrix_component: ehmtx_display
  time_component: ehmtx_time
  time_format: "%H:%M"
  date_format: "%d.%m."
  show_seconds: false
  show_dow: true
  advanced_clock: true
  right_center_indicator: false
  left_center_indicator: false
  clock_interval: 80
  flip_flop_clock: true
  blend_steps: 20
  brightness: 100
  vertical_scroll: false
  multicolor_text: true
  rainbow_shimmer: true
  default_font_id: default_font
  default_font_yoffset: 8
  special_font_id: special_font
  special_font_yoffset: 7
  icons: 
    - id: error
      lameid: 40530
    - id: home_assistant
      lameid: 47693
    - id: temperature
      lameid: 2056
    - id: lightbulb
      lameid: 1762
    - id: music
      lameid: 45625
    - id: phone
      lameid: 1232
    - id: car
      lameid: 2819
    - id: sleep8x32
      url: https://user-images.githubusercontent.com/16407309/224850723-634c9b2d-55d9-44f2-9f93-765c0485b090.gif 
  on_empty_queue:
    then:
      lambda: |-
        id(rgb8x32)->clock_screen(10,10);
        id(rgb8x32)->date_screen(10,5);